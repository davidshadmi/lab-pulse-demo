<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabPulse Pro v4.0 | Enterprise Security & Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .sync-loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm">
        <div class="glass w-full max-w-md p-8 rounded-3xl card-shadow border border-white/20">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 text-white text-2xl shadow-lg shadow-blue-200">
                    <i class="fas fa-microscope"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">LabPulse Pro v4.0</h1>
                <p class="text-slate-500 text-sm mt-1">Enterprise Security & Cloud Sync</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 mr-1">GitHub Fine-grained Token</label>
                    <input type="password" id="ghToken" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-slate-50/50" placeholder="github_pat_...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 mr-1">Repository Path</label>
                    <input type="text" id="ghRepo" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-slate-50/50" placeholder="username/repo">
                </div>
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                    <label for="rememberMe" class="text-sm text-slate-600">זכור אותי במכשיר זה</label>
                </div>
                <button onclick="unlock()" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-xl font-semibold transition-all shadow-xl active:scale-[0.98]">כניסה למערכת</button>
                <p id="errMsg" class="text-center text-rose-500 text-sm font-medium hidden">פרטי גישה או קבצי נתונים לא תקינים</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen">
        <header class="glass sticky top-0 z-40 border-b border-slate-200 px-6 py-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md">
                        <i class="fas fa-pulse"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg leading-tight">LabPulse Pro</h2>
                        <div class="flex items-center gap-2">
                            <span id="syncDot" class="w-2 h-2 rounded-full bg-emerald-500"></span>
                            <span id="syncText" class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">ענן מסונכרן</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="showSection('dashboard')" class="p-2 px-4 rounded-lg hover:bg-slate-100 text-slate-600 font-medium text-sm transition-colors">דשבורד</button>
                    <button onclick="showSection('inventory')" class="p-2 px-4 rounded-lg hover:bg-slate-100 text-slate-600 font-medium text-sm transition-colors">ציוד</button>
                    <button onclick="logout()" class="p-2 px-4 rounded-lg text-rose-500 hover:bg-rose-50 font-medium text-sm transition-colors">ניתוק</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <section id="dashboardSection" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-6 rounded-3xl border border-slate-200 card-shadow">
                        <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-4">תעדוף תיקונים (ROI)</h3>
                        <div id="priorityList" class="space-y-4"></div>
                    </div>
                    <div class="md:col-span-2 glass p-6 rounded-3xl border border-slate-200 card-shadow">
                        <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-4">פילוח תקלות שנתי</h3>
                        <canvas id="mainChart" height="200"></canvas>
                    </div>
                </div>
            </section>

            <section id="inventorySection" class="hidden">
                <div class="glass rounded-3xl border border-slate-200 card-shadow overflow-hidden">
                    <table class="w-full text-right border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">מזהה</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">מכשיר</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">מחלקה</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">סטטוס</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/60 p-4">
        <div class="glass w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl p-8 border border-white/20">
            <div id="modalContent"></div>
            <button onclick="closeModal()" class="mt-8 w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold transition-colors">סגור</button>
        </div>
    </div>

    <script>
        let assets = [], maint = {}, chart;
        let GH = { token: '', repo: '' };
        const PASS = "Sheba2026";

        // Restore Original Compatible Encoding
        function enc(d, p) {
            let s = JSON.stringify(d);
            let r = "";
            for (let i = 0; i < s.length; i++) {
                r += String.fromCharCode(s.charCodeAt(i) ^ p.charCodeAt(i % p.length));
            }
            return btoa(unescape(encodeURIComponent(r)));
        }

        function dec(c, p) {
            try {
                let s = decodeURIComponent(escape(atob(c)));
                let r = "";
                for (let i = 0; i < s.length; i++) {
                    r += String.fromCharCode(s.charCodeAt(i) ^ p.charCodeAt(i % p.length));
                }
                return JSON.parse(r);
            } catch (e) { return null; }
        }

        async function ghSync(path, data) {
            if (!GH.token || !GH.repo) return;
            const indText = document.getElementById('syncText');
            const indDot = document.getElementById('syncDot');
            indText.innerText = "מעדכן ענן...";
            indDot.classList.add('sync-loading');

            try {
                const url = `https://api.github.com/repos/${GH.repo}/contents/${path}`;
                const headers = { 'Authorization': `Bearer ${GH.token}`, 'Accept': 'application/vnd.github.v3+json' };
                const refRes = await fetch(url, { headers });
                let sha = null;
                if (refRes.ok) { sha = (await refRes.json()).sha; }
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Sync: ${path}`, content: enc(data, PASS), sha: sha })
                });
                if(!res.ok) throw new Error();
                indText.innerText = "ענן מסונכרן";
                indDot.classList.remove('sync-loading');
                indDot.classList.replace('bg-amber-500', 'bg-emerald-500');
            } catch(e) {
                indText.innerText = "שגיאת סנכרון";
                indDot.classList.replace('bg-amber-500', 'bg-rose-500');
            }
        }

        async function loadData() {
            // 1. Try Local Files
            try {
                const aRaw = await fetch('assets.dat').then(r => r.ok ? r.text() : null);
                const mRaw = await fetch('maintenance.dat').then(r => r.ok ? r.text() : null);
                if (aRaw && mRaw) {
                    const a = dec(aRaw, PASS);
                    const m = dec(mRaw, PASS);
                    if (a && m) return { a, m };
                }
            } catch (e) {}

            // 2. Fallback to GitHub (strip API base64 layer first)
            if (GH.token && GH.repo) {
                try {
                    const fetchGH = async (p) => {
                        const r = await fetch(`https://api.github.com/repos/${GH.repo}/contents/${p}`, {
                            headers: { 'Authorization': `Bearer ${GH.token}` }
                        });
                        if (!r.ok) return null;
                        const j = await r.json();
                        // Important: atob converts the API response back to the file's original encrypted string
                        return dec(atob(j.content.replace(/\s/g, '')), PASS);
                    };
                    const a = await fetchGH('assets.dat');
                    const m = await fetchGH('maintenance.dat');
                    if (a && m) return { a, m };
                } catch (e) { console.error("Cloud load error", e); }
            }
            return null;
        }

        async function unlock() {
            const err = document.getElementById('errMsg');
            const btn = document.querySelector('#authOverlay button');
            err.classList.add('hidden');
            GH.token = document.getElementById('ghToken').value.trim();
            GH.repo = document.getElementById('ghRepo').value.trim();
            const remember = document.getElementById('rememberMe').checked;

            btn.innerText = "טוען נתונים...";
            const data = await loadData();
            
            if (data) {
                assets = data.a;
                maint = data.m;
                if (remember) {
                    localStorage.setItem('lp_gh_token_v4', GH.token);
                    localStorage.setItem('lp_gh_repo_v4', GH.repo);
                    localStorage.setItem('lp_remember_v4', 'true');
                } else {
                    localStorage.removeItem('lp_gh_token_v4');
                    localStorage.removeItem('lp_gh_repo_v4');
                    localStorage.removeItem('lp_remember_v4');
                }
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                updateUI();
            } else {
                btn.innerText = "כניסה למערכת";
                err.classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }
        function updateUI() { renderPriorities(); renderInventory(); renderChart(); }

        function renderPriorities() {
            const list = document.getElementById('priorityList');
            const sorted = assets.filter(a => a.status === "תיקון").map(a => {
                const logs = maint[a.id] || [];
                const cost = logs.reduce((sum, l) => sum + (l.cost || 0), 0);
                const score = (cost / a.value) * (a.critical ? 1.5 : 1);
                return { ...a, score };
            }).sort((a, b) => b.score - a.score);

            list.innerHTML = sorted.map(a => `
                <div class="flex items-center justify-between p-3 rounded-2xl bg-slate-50 border border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-8 rounded-full ${a.critical ? 'bg-rose-500' : 'bg-amber-400'}"></div>
                        <div><p class="font-bold text-sm">${a.name}</p><p class="text-[10px] text-slate-400 uppercase font-bold">${a.dept}</p></div>
                    </div>
                    <button onclick="showDetail('${a.id}')" class="text-blue-600 hover:text-blue-800"><i class="fas fa-chevron-left"></i></button>
                </div>`).join('') || '<p class="text-center text-slate-400 text-sm italic py-4">אין מכשירים הממתינים לתיקון</p>';
        }

        function renderInventory() {
            document.getElementById('inventoryBody').innerHTML = assets.map(a => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="p-4 text-xs font-mono text-slate-400">${a.id}</td>
                    <td class="p-4 font-bold text-sm">${a.name}</td>
                    <td class="p-4 text-sm text-slate-600">${a.dept}</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${
                        a.status === 'תקין' ? 'bg-emerald-100 text-emerald-700' : 
                        a.status === 'תיקון' ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-700'
                    }">${a.status}</span></td>
                    <td class="p-4"><button onclick="showDetail('${a.id}')" class="text-slate-400 hover:text-blue-600 transition-colors"><i class="fas fa-eye"></i></button></td>
                </tr>`).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const data = {};
            Object.values(maint).flat().forEach(l => {
                const year = new Date(l.date).getFullYear();
                data[year] = (data[year] || 0) + 1;
            });
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Object.keys(data), datasets: [{ label: 'תקלות', data: Object.values(data), borderColor: '#2563eb', tension: 0.4, fill: true, backgroundColor: 'rgba(37, 99, 235, 0.05)' }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function showDetail(id) {
            const a = assets.find(x => x.id === id);
            const logs = maint[id] || [];
            document.getElementById('modalContent').innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div><h2 class="text-2xl font-bold">${a.name}</h2><p class="text-slate-400 font-mono text-sm">${a.id} | ${a.model}</p></div>
                    <span class="px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold">${a.dept}</span>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">ערך כינון</p><p class="text-xl font-bold">₪${a.value.toLocaleString()}</p></div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">חוזה שירות</p><p class="text-xl font-bold text-emerald-600">${a.contract || 'ללא'}</p></div>
                </div>
                <h3 class="font-bold text-lg mb-4">היסטוריית תחזוקה</h3>
                <div class="space-y-3">${logs.map(l => `
                    <div class="flex justify-between p-4 bg-white border border-slate-100 rounded-xl shadow-sm">
                        <div><p class="font-bold text-sm">${l.action}</p><p class="text-xs text-slate-400">${l.date} | ${l.technician}</p></div>
                        <p class="font-bold text-blue-600">₪${l.cost.toLocaleString()}</p>
                    </div>`).join('') || '<p class="text-slate-400 italic">אין היסטוריה זמינה</p>'}</div>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function showSection(name) {
            document.getElementById('dashboardSection').classList.toggle('hidden', name !== 'dashboard');
            document.getElementById('inventorySection').classList.toggle('hidden', name !== 'inventory');
        }

        window.onload = () => {
            if(localStorage.getItem('lp_remember_v4') === 'true') {
                document.getElementById('ghToken').value = localStorage.getItem('lp_gh_token_v4') || '';
                document.getElementById('ghRepo').value = localStorage.getItem('lp_gh_repo_v4') || '';
                document.getElementById('rememberMe').checked = true;
            }
        };
    </script>
</body>
</html>
