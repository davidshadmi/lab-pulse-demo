<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabPulse Pro v4.0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div class="glass w-full max-w-md p-6 rounded-3xl shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-lg mb-4">
                    <i class="fas fa-microscope"></i>
                </div>
                <h1 class="text-xl font-bold">LabPulse Pro v4.0</h1>
                <p class="text-slate-500 text-xs">Mobile Cloud Sync</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="ghToken" class="w-full px-4 py-3 rounded-xl border bg-slate-50/50" placeholder="GitHub Token">
                <input type="text" id="ghRepo" class="w-full px-4 py-3 rounded-xl border bg-slate-50/50" placeholder="username/repo">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="rememberMe" checked class="w-5 h-5 text-blue-600">
                    <label for="rememberMe" class="text-sm">זכור אותי במכשיר זה</label>
                </div>
                <button onclick="unlock(this)" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">כניסה</button>
                <div id="errMsg" class="hidden p-3 rounded-lg bg-rose-50 text-rose-600 text-[11px] font-bold text-center"></div>
            </div>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen">
        <header class="glass sticky top-0 z-40 px-4 py-3 flex justify-between items-center shadow-sm">
            <h2 class="font-bold text-sm">LabPulse Pro</h2>
            <div class="flex gap-4">
                <button onclick="showSection('dashboard')" class="text-xs font-bold">דשבורד</button>
                <button onclick="showSection('inventory')" class="text-xs font-bold">ציוד</button>
                <button onclick="logout()" class="text-rose-500"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main class="p-4">
            <div id="dashboardSection">
                <div id="priorityList" class="space-y-3 mb-6"></div>
                <div class="glass p-4 rounded-2xl"><canvas id="mainChart" height="200"></canvas></div>
            </div>
            <div id="inventorySection" class="hidden">
                <div id="inventoryList" class="divide-y bg-white rounded-2xl border overflow-hidden"></div>
            </div>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-end justify-center bg-slate-900/60">
        <div class="glass w-full rounded-t-3xl p-6 max-h-[90vh] overflow-y-auto">
            <div id="modalContent"></div>
            <button onclick="closeModal()" class="mt-6 w-full py-4 bg-slate-100 rounded-2xl font-bold">סגור</button>
        </div>
    </div>

    <script>
        let assets = [], maint = {}, chart;
        let GH = { token: '', repo: '' };
        const PASS = "Sheba2026";

        // פונקציית פענוח אוניברסלית התומכת בעברית ובקידוד GitHub
        function decrypt(base64, password) {
            try {
                // ניקוי רווחים מיותרים מ-GitHub
                const binary = atob(base64.replace(/\s/g, ''));
                let decrypted = "";
                for (let i = 0; i < binary.length; i++) {
                    decrypted += String.fromCharCode(binary.charCodeAt(i) ^ password.charCodeAt(i % password.length));
                }
                // פענוח UTF-8 (תמיכה בעברית)
                const utf8 = decodeURIComponent(escape(decrypted));
                return JSON.parse(utf8);
            } catch (e) {
                console.error("Decryption failed", e);
                return null;
            }
        }

        async function fetchFile(path) {
            const url = `https://api.github.com/repos/${GH.repo}/contents/${path}`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${GH.token}` } });
            if (!res.ok) throw new Error(`קובץ ${path} לא נמצא`);
            const json = await res.json();
            // GitHub כבר מקודד את הקובץ ב-Base64 בתוך שדה ה-content
            const data = decrypt(json.content, PASS);
            if (!data) throw new Error(`כשל בפענוח ${path}. בדוק את תוכן הקובץ ב-GitHub.`);
            return data;
        }

        async function unlock(btn) {
            const errDiv = document.getElementById('errMsg');
            errDiv.classList.add('hidden');
            GH.token = document.getElementById('ghToken').value.trim();
            GH.repo = document.getElementById('ghRepo').value.trim();
            
            btn.innerText = "טוען...";
            btn.disabled = true;

            try {
                assets = await fetchFile('assets.dat');
                maint = await fetchFile('maintenance.dat');

                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('lp_gh_token_v4', GH.token);
                    localStorage.setItem('lp_gh_repo_v4', GH.repo);
                    localStorage.setItem('lp_remember_v4', 'true');
                }

                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                updateUI();
            } catch (e) {
                btn.innerText = "כניסה";
                btn.disabled = false;
                errDiv.innerText = e.message;
                errDiv.classList.remove('hidden');
            }
        }

        function updateUI() {
            renderPriorities();
            renderInventory();
            renderChart();
        }

        function renderPriorities() {
            const list = document.getElementById('priorityList');
            const repairItems = assets.filter(a => a.status === "תיקון").slice(0, 10);
            list.innerHTML = repairItems.map(a => `
                <div class="p-4 bg-white border rounded-2xl flex justify-between items-center" onclick="showDetail('${a.id}')">
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-8 rounded-full ${a.critical ? 'bg-rose-500' : 'bg-amber-400'}"></div>
                        <div><p class="font-bold text-sm">${a.name}</p><p class="text-[10px] text-slate-400">${a.dept}</p></div>
                    </div>
                    <i class="fas fa-chevron-left text-slate-300"></i>
                </div>`).join('') || '<p class="text-xs text-center text-slate-400">אין מכשירים בתיקון</p>';
        }

        function renderInventory() {
            document.getElementById('inventoryList').innerHTML = assets.slice(0, 100).map(a => `
                <div class="p-4 flex justify-between items-center" onclick="showDetail('${a.id}')">
                    <div><p class="font-bold text-sm">${a.name}</p><p class="text-[10px] text-slate-400">${a.id}</p></div>
                    <span class="text-[9px] font-black uppercase px-2 py-1 rounded ${a.status === 'תקין' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${a.status}</span>
                </div>`).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const years = ["2023", "2024", "2025"];
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: years, datasets: [{ label: 'תקלות', data: [12, 19, 3], backgroundColor: '#2563eb' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function showDetail(id) {
            const a = assets.find(x => x.id === id);
            const logs = maint[id] || [];
            document.getElementById('modalContent').innerHTML = `
                <h2 class="text-xl font-bold mb-1">${a.name}</h2>
                <p class="text-xs text-slate-400 mb-6">מזהה: ${a.id} | דגם: ${a.model}</p>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[9px] font-bold text-slate-400">מחלקה</p><p class="font-bold">${a.dept}</p></div>
                    <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[9px] font-bold text-slate-400">ספק</p><p class="font-bold text-blue-600">${a.contract}</p></div>
                </div>
                <h3 class="font-bold text-sm mb-3">היסטוריית טיפולים</h3>
                <div class="space-y-2">${logs.map(l => `<div class="p-3 border rounded-xl text-xs"><div class="flex justify-between font-bold"><p>${l.action}</p><p>₪${l.cost}</p></div><p class="text-slate-400">${l.date}</p></div>`).join('') || '<p class="text-xs italic text-slate-400">אין היסטוריה</p>'}</div>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function showSection(name) {
            document.getElementById('dashboardSection').classList.toggle('hidden', name !== 'dashboard');
            document.getElementById('inventorySection').classList.toggle('hidden', name !== 'inventory');
        }
        function logout() { localStorage.removeItem('lp_remember_v4'); location.reload(); }

        window.onload = () => {
            if(localStorage.getItem('lp_remember_v4') === 'true') {
                document.getElementById('ghToken').value = localStorage.getItem('lp_gh_token_v4') || '';
                document.getElementById('ghRepo').value = localStorage.getItem('lp_gh_repo_v4') || '';
            }
        };
    </script>
</body>
</html>
